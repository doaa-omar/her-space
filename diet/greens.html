<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | HerSpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FCF8F5; --pink: #FADADD; --gold: #D4AF37; --text: #5D5451; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        
                .page-header-img {
            width: 100%;
            height: 350px;             background-image: url('pic6.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 5px solid var(--pink);
        }

        .nav-back { padding: 20px; text-align: left; }
        .nav-back a { text-decoration: none; color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-top: 20px; }
        .quote { color: var(--gold); font-style: italic; font-size: 1.1rem; max-width: 600px; margin: 15px auto 40px; font-family: 'Playfair Display', serif; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 0 50px 50px; }
        .gallery-grid img { width: 100%; height: 380px; object-fit: cover; border-radius: 15px; border: 6px solid #fff; box-shadow: 0 10px 25px rgba(250, 218, 221, 0.4); transition: 0.3s ease; }
        .gallery-grid img:hover { transform: scale(1.03); border-color: var(--pink); }
    </style>
</head>
<body>

    <div class="page-header-img"></div>

    <div class="nav-back">
        <a href="diet.html">← RETURN TO HOME</a>
    </div>
    
    <h1>Vibrant Greens</h1>
    <p class="quote">"Experience the purity of nature with our handpicked organic selection, designed to rejuvenate your inner glow."</p>

    <div class="gallery-grid">
        <img src="images/pic2.jpg">
        <img src="images/pic3.jpg">
        <img src="images/pic4.jpg">
    </div>

</body>
</html>
