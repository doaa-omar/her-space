<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hijab Style Guide</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#fcfaf9;
    text-align:center;
    padding:20px;
}

h2{
    color:#8d5555;
    margin-top:30px;
}

.skin-selector{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
    flex-wrap:wrap;
}

.skin-option{
    text-decoration:none;
    color:black;
}

.skin-circle{
    width:75px;
    height:75px;
    border-radius:50%;
    border:4px solid white;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    margin-bottom:8px;
    transition:.3s;
}

.skin-option:hover .skin-circle{
    transform:translateY(-5px);
    border-color:#b56b6b;
}

.white-skin{ background:#ffdbac; }
.wheat-skin{ background:#e8beac; }
.dark-skin{ background:#ac7e6c; }
</style>
</head>

<body>

<h2>Select your skin color</h2>

<div class="skin-selector">

    <a href="white.html" class="skin-option">
        <div class="skin-circle white-skin"></div>
        <span>white skin</span>
    </a>

    <a href="wheat.html" class="skin-option">
        <div class="skin-circle wheat-skin"></div>
        <span>wheat skin</span>
    </a>

    <a href="dark.html" class="skin-option">
        <div class="skin-circle dark-skin"></div>
        <span>dark skin</span>
    </a>
  
</div>
<br>
<br>

<a href="../home/index.html" class="back-link">Back to home←</a>
</body>
</html>
