<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Body */
body {
    background-color: #ffe6eb; 
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: white;
}

header .logo {
    display: flex;
    align-items: center;
}

header .logo img {
    width: 50px;
    margin-right: 10px;
}

header nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #333;
    font-size: 14px;
}

/* Hero Section */
.hero {
    position: relative;
    height: 75vh;
    overflow: hidden;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    align-items: right;
}

.hero .overlay-text {
    position: absolute;
    top: 50%;
    left: 10%;
    transform: translateY(-50%);
    color:black;
}

.hero .overlay-text h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero .overlay-text p {
    font-size: 18px;
}

/* Content Text */
.content {
    padding: 30px;
    text-align: center;
}

.content p {
    font-size: 18px;
    color: #444;
}

/* Cards Section */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 30px;
    flex-wrap: wrap;
}

.card {
    background: white;
    width: 220px;
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card h3 {
    padding: 15px;
    font-size: 18px;
    color: #333;
}
</style>

</head>
