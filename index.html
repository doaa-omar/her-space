<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Her Space</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
}

.hero{
    height:100vh;

    background:
    url("home14.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:500px;

    padding:50px;

    border-radius:25px;

    background:rgba(255,255,255,0.1);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    color:white;

    text-align:center;
}

.card h1{
    font-size:55px;
    margin-bottom:20px;
}

.card p{
    font-size:20px;
    margin-bottom:35px;
}

/* BUTTON */

.btn{

    display:inline-block;

    padding:15px 35px;

    background:#ffb6c1;

    color:white;

    text-decoration:none;

    border-radius:10px;

    transition:0.3s;
}

.btn:hover{

    background:#fa8072;

    color:white;
}

</head>

    <div class="card">

            the world of girls.
